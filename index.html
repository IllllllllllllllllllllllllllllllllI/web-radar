<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemesis Radar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="login-screen" class="overlay">
        <div class="login-card">
            <div class="input-group">
                <div class="input-wrapper">
                    <input type="text" id="session-code" placeholder="ENTER SESSION CODE" autocomplete="off" spellcheck="false">
                </div>
                <button id="connect-btn">CONNECT</button>
            </div>
            <div id="error-msg" class="error-msg" style="display:none;"></div>
        </div>
    </div>

    <div id="radar-container" class="hidden">
        <div class="header">
            <div class="status-indicator">
                <span class="dot pulse"></span> <span class="status-text">CONNECTED</span>
            </div>
            <div class="session-info">
                SESSION: <span id="display-code" class="accent">--------</span>
            </div>
            <div class="header-right">
                <button id="options-btn" class="opts-btn">CONFIG</button>
            </div>
        </div>

        <div class="radar-wrapper">
            <canvas id="radar-canvas"></canvas>

            <div id="options-panel" class="options-panel" style="display:none;">
                <div class="panel-header">RADAR CONFIGURATION</div>
                
                <div class="opt-group">
                    <div class="opt-section-title">VISUALS</div>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="opt-names">
                        <span class="checkmark"></span>
                        Name
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="opt-health">
                        <span class="checkmark"></span>
                        Health
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="opt-distance">
                        <span class="checkmark"></span>
                        Distance
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="opt-team">
                        <span class="checkmark"></span>
                        Show Team
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="opt-dead">
                        <span class="checkmark"></span>
                        Dead Players
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="opt-map">
                        <span class="checkmark"></span>
                        Show Map
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="opt-follow">
                        <span class="checkmark"></span>
                        Follow Player
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="opt-rotate-cam">
                        <span class="checkmark"></span>
                        Rotate Camera
                    </label>
                </div>

                <div class="opt-group">
                    <div class="opt-section-title">WIDGETS</div>
                    
                    <div class="widget-row">
                        <span class="widget-label">SHAPE</span>
                        <div class="custom-select-wrapper">
                            <select id="opt-shape" class="custom-select">
                                <option value="circle">CIRCLE</option>
                                <option value="square">SQUARE</option>
                            </select>
                        </div>
                    </div>

                    <div class="widget-row slider-col">
                        <div class="slider-header">
                            <span class="widget-label">ENTITY SIZE</span>
                            <span id="opt-dotsize-val" class="slider-value">4.5</span>
                        </div>
                        <input type="range" id="opt-dotsize" min="2" max="10" value="4.5" step="0.5" class="custom-slider">
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="zoom-info">
                ZOOM: <span id="zoom-val">1.0</span>x <span class="hint">| SCROLL TO ZOOM</span>
            </div>
            <div class="version">NEMESIS</div>
        </div>
    </div>

    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.3.min.js"></script>
    <script src="radar.js"></script>
</body>
</html>
