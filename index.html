<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemesis Remote Radar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login -->
    <div id="login-screen" class="overlay">
        <div class="login-card">
            <h1>NEMESIS <span class="accent">RADAR</span></h1>
            <p>Access remote telemetry stream</p>
            <div class="input-group">
                <input type="text" id="session-code" placeholder="Enter Session Code" autocomplete="off" spellcheck="false">
                <button id="connect-btn">CONNECT</button>
            </div>
            <div id="error-msg" class="error-msg" style="display:none;"></div>
        </div>
    </div>

    <!-- Radar -->
    <div id="radar-container" class="hidden">
        <div class="header">
            <div class="status-indicator">
                <span class="dot pulse"></span> LIVE STREAMING
            </div>
            <div class="session-info">
                SESSION: <span id="display-code" class="accent">--------</span>
            </div>
            <div class="header-right">
                <button id="options-btn" class="opts-btn">⚙ OPTIONS</button>
            </div>
        </div>

        <div class="radar-wrapper">
            <canvas id="radar-canvas"></canvas>

            <!-- Options Panel -->
            <div id="options-panel" class="options-panel" style="display:none;">
                <div class="opt-section-title">DISPLAY</div>
                <label class="opt-row"><input type="checkbox" id="opt-names"    checked> Names</label>
                <label class="opt-row"><input type="checkbox" id="opt-health"   checked> Health Bars</label>
                <label class="opt-row"><input type="checkbox" id="opt-distance" checked> Distance</label>
                <label class="opt-row"><input type="checkbox" id="opt-team"     checked> Show Teammates</label>
                <label class="opt-row"><input type="checkbox" id="opt-dead"> Show Dead</label>

                <div class="opt-section-title" style="margin-top:12px;">DOT SIZE</div>
                <div class="opt-row">
                    <input type="range" id="opt-dotsize" min="3" max="12" value="5" class="opt-slider">
                    <span id="opt-dotsize-val">5</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="zoom-display">ZOOM: <span id="zoom-val">1.0</span>x &nbsp;|&nbsp; Scroll to zoom</div>
        </div>
    </div>

    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.3.min.js"></script>
    <script src="radar.js"></script>
    <script>
        // Dot size slider live update
        const ds = document.getElementById('opt-dotsize');
        const dsVal = document.getElementById('opt-dotsize-val');
        if (ds && dsVal) ds.oninput = () => { dsVal.textContent = ds.value; };
    </script>
</body>
</html>
